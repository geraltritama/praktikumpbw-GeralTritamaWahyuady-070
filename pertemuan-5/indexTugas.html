<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Nilai Matkul</title>

    <!-- style -->
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="main">
        <h1>Cek Nilai Mata Kuliah</h1>

        <div class="main-content">
            <label for="">NIM:</label>
            <input type="text" id="nim" placeholder="Masukan NPM">

            <label for="">Nama:</label>
            <input type="text" id="nama" placeholder="Masukan Nama">

            <label for="">Nilai:</label>
            <input type="number" id="nilai" placeholder="Masukan Nilai(contoh: 100)">

            <button onclick="cekNilai()">Cek Nilai</button>
        </div>

        <div class="result">
            <h3><b>Hasil:</b></h3>
            <p id="hasil"></p>
        </div>
    </div>
    <!-- script -->
    <script src="index.js"></script>
</body>
</html>
